async function getHelp() {

  const question = document.querySelector("input").value;

  try {

    const response = await fetch("https://eoya0pys5sgrwzp.m.pipedream.net",{
  method: "POST",
  mode: "cors",
  headers:{
    "Content-Type":"application/json"
  },
  body: JSON.stringify({
    question: question
  })
});
const data = await response.json();
const text = data.message;

document.getElementById("response").innerText = text;

const typeMatch = text.match(/TYPE:(IMAGE|AI|BOTH)/);
const type = typeMatch ? typeMatch[1] : "AI";

const stepMatch = text.match(/STEP:(\d+)/);
const step = stepMatch ? parseInt(stepMatch[1]) : 0;

if((type === "IMAGE" || type === "BOTH") && step > 0){

  const img = document.getElementById("stepImage");

  if(STEP_IMAGES[step]){
    img.src = STEP_IMAGES[step];
    img.style.display = "block";
  }

}
else{

  document.getElementById("stepImage").style.display = "none";

}

  }
  catch(err){
    document.getElementById("response").innerText = "Connection error";
  }

}
